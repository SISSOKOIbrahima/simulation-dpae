<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulation DPAE — Launchpad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241b12; --ink-soft:#4a3d2e; --paper:#f6f2ea; --card:#fffdf8; --line:#d8cfc0;
    --critique:#a02318; --critique-bg:#f7e6e3;
    --ok:#3d6b35; --ok-bg:#e7efe2;
    --warn:#8a6410; --warn-bg:#f5edd8;
    --blue:#2c4a6e; --blue-bg:#e5edf5;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Public Sans',sans-serif;background:var(--paper);color:var(--ink);line-height:1.55}
  .wrap{max-width:1060px;margin:0 auto;padding:28px 20px 80px}
  header{display:flex;align-items:baseline;justify-content:space-between;border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:26px;flex-wrap:wrap;gap:6px}
  .wordmark{font-family:'Fraunces',serif;font-weight:900;font-size:1.35rem;letter-spacing:.04em}
  .wordmark span{font-weight:500;letter-spacing:.12em;font-size:.8rem;text-transform:uppercase;color:var(--ink-soft);margin-left:10px}
  h1{font-family:'Fraunces',serif;font-weight:700;font-size:clamp(1.6rem,3.4vw,2.3rem);margin-bottom:6px}
  .lede{color:var(--ink-soft);max-width:640px;margin-bottom:24px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:18px;margin-bottom:16px}
  .panel h2{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;margin-bottom:12px}
  .inputs-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  @media(max-width:700px){.inputs-grid{grid-template-columns:1fr}}
  .field{display:flex;flex-direction:column;gap:6px}
  .field label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
  .field input,.field select{font-size:.95rem;font-family:'Public Sans',sans-serif;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:4px;padding:10px 12px;outline:none}
  .field input:focus,.field select:focus{outline:2px solid var(--ink);outline-offset:1px}
  .field select{cursor:pointer}
  .dpae-banner{background:var(--critique-bg);border:1px solid var(--critique);border-left:6px solid var(--critique);border-radius:6px;padding:18px 20px;margin-bottom:16px}
  .dpae-banner-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--critique);margin-bottom:4px}
  .dpae-banner-date{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:900;color:var(--critique);line-height:1.15;margin-bottom:4px;text-transform:capitalize}
  .dpae-banner-sub{font-size:.8rem;color:var(--ink-soft)}
  .metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
  .metric{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:14px}
  .metric-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:4px}
  .metric-value{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:900}
  .metric-sub{font-size:.72rem;color:var(--ink-soft);margin-top:3px}
  .sec-title{font-family:'Fraunces',serif;font-weight:700;font-size:1rem;border-bottom:2px solid var(--ink);padding-bottom:6px;margin:6px 0 14px}
  .legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .legend span{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px}
  .lg-sal{background:var(--warn-bg);color:var(--warn)}
  .lg-sep{background:var(--ok-bg);color:var(--ok)}
  .lg-gpu{background:var(--blue-bg);color:var(--blue)}
  .lg-adm{background:var(--critique-bg);color:var(--critique)}
  .lg-pay{background:var(--ink);color:var(--paper)}
  /* ---- Disposition calendrier + échéancier ---- */
  .duo{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  @media(max-width:900px){.duo{grid-template-columns:1fr}}
